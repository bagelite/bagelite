<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation de Commande | Bag Elite</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;

<body id="checkout-page">

    <!-- Header -->
    <header id="header" class="scrolled">
        <div class="logo">
            <a href="index.html">
                <img src="images/logooooooooooo.png" alt="Bag Elite Logo">
            </a>
        </div>
        
        <nav id="nav">
            <ul>
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#categories">Categories</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>

    </header>

    <!-- Checkout Section -->
    <section class="section" style="margin-top: 80px;">
        <div class="section-title">
            <h2>Finaliser votre commande</h2>
        </div>

        <div id="checkout-product-preview" class="checkout-product-preview"></div>

        <div class="checkout-container">
            <!-- Customer Form -->
            <div class="checkout-form">
                <h3>Informations de Livraison</h3>
                <br>
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" id="prenom" placeholder="Votre prénom" required>
                </div>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="ville">Ville</label>
                    <input type="text" id="ville" placeholder="Ex: Casablanca" required>
                </div>
                <div class="form-group">
                    <label for="adresse">Adresse complète</label>
                    <input type="text" id="adresse" placeholder="Votre adresse de livraison" required>
                </div>
                <div class="form-group">
                    <label for="telephone">Numéro de téléphone</label>
                    <input type="tel" id="telephone" placeholder="06XXXXXXXX" required>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="order-summary">
                <h3>Résumé de la commande</h3>
                <div id="summary-list">
                    <!-- Loaded by JS -->
                </div>
                
                <div class="summary-item" style="border-top: 1px solid #333; margin-top: 20px; padding-top: 20px;">
                    <span>Sous-total</span>
                    <span id="total-produits">0 DH</span>
                </div>
                <div class="summary-item">
                    <span>Livraison</span>
                    <span>20 DH</span>
                </div>
                
                <div class="summary-total">
                    <span>Total Général</span>
                    <span id="total-general">20 DH</span>
                </div>

                <button class="btn-confirm" onclick="confirmOrder()">Confirmer la commande</button>
                <p style="text-align: center; font-size: 12px; margin-top: 15px; color: #999;">
                    En cliquant sur confirmer, vous validez votre commande.
                </p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 Tous droits réservés. Bag Elite Perfumes.</p>
        </div>
    </footer>

    <!-- Vanilla JavaScript -->
    <script src="script.js"></script>
</body>
</html>
